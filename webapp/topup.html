<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarPayUz - Hisobni to'ldirish</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.API_BASE = 'https://worker-production-679d.up.railway.app';
    </script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #030712;
            color: #fff;
            padding: 15px;
            padding-bottom: 200px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .header-left__image {
            width: 60px;
            height: 60px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .balance-badge {
            color: #fff;
            font-weight: 600;
            border: 1px solid #3B82F6;
            background: #031632;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 11px;
            transition: .3s;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .page-title h2 {
            color: #3B82F6;
            font-size: 24px;
            font-weight: 700;
        }



        .section-title {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .amount-input-wrapper {
            margin-bottom: 16px;
        }

        .amount-input-wrapper .section-title {
            margin-bottom: 14px;
        }

        .amount-input {
            width: 100%;
            background: #111827;
            border: 2px solid #3B82F6;
            border-radius: 16px;
            padding: 14px 16px;
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            outline: none;
            transition: .3s;
            text-align: center;
        }

        .amount-input:focus {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.35);
        }

        .amount-input::placeholder {
            color: #4B5563;
            font-weight: 500;
            font-size: 18px;
        }



        .btn-pay {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #3B82F6 0%, #2563eb 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
            box-shadow: 0 4px 24px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-pay:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.4);
        }

        .btn-pay:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-pay .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
        }

        .btn-pay.loading .spinner {
            display: inline-block;
        }

        .btn-pay.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-text {
            text-align: center;
            color: #64748b;
            font-size: 13px;
            margin-top: 16px;
            line-height: 1.5;
        }

        .bottom-nav {
            position: fixed;
            left: 15px;
            right: 15px;
            bottom: 15px;
            z-index: 50;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, .05);
            border-radius: 28px;
            padding: 12px 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(20px);
            pointer-events: auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 70px;
            color: #9CA3AF;
            cursor: pointer;
            transition: .3s;
        }

        .nav-item:hover {
            color: #fff;
        }

        .nav-item.active {
            color: #3B82F6;
        }

        .nav-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 34px;
        }

        .nav-icon img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
            color: inherit;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <a href="/">
                <img src="./images/logo.png" alt="StarPayUz" class="header-left__image">
            </a>
        </div>
        <div class="header-right">
            <div class="balance-badge" id="balance">0 so'm</div>
        </div>
    </div>

    <!-- Content -->
    <div class="page-title">
        <img src="./images/money.webp" alt="" style="width: 30px; height: 30px; vertical-align: middle;">
        <h2>Hisobni to'ldirish</h2>
    </div>



    <!-- Amount Input -->
    <div class="amount-input-wrapper">
        <div class="section-title">💵 Summani kiriting</div>
        <input type="number" id="amountInput" class="amount-input" placeholder="Masalan: 50 000" min="1000" max="100000000">
    </div>



    <!-- Pay Button -->
    <button class="btn-pay" id="payBtn" onclick="handlePay()">
        <span class="btn-text">💳 To'lovni amalga oshirish</span>
        <span class="spinner"></span>
    </button>

    <div class="info-text">
        Minimal: 1 000 so'm · Maksimal: 100 000 000 so'm<br>
        To'lov xavfsiz amalga oshiriladi
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="openStars()">
            <div class="nav-icon">
                <img src="./images/home.webp" alt="home">
            </div>
            <div class="nav-label">Menu</div>
        </div>
        <div class="nav-item" onclick="openGifts()">
            <div class="nav-icon">
                <img src="./images/gift.webp" alt="Gifts">
            </div>
            <div class="nav-label">Gifts</div>
        </div>
        <div class="nav-item" onclick="openReyting()">
            <div class="nav-icon">
                <img src="./images/rating.webp" alt="Rating">
            </div>
            <div class="nav-label">Rating</div>
        </div>
        <div class="nav-item active" onclick="openProfile()">
            <div class="nav-icon">
                <img src="./images/profile.webp" alt="profile">
            </div>
            <div class="nav-label">Profil</div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        let selectedAmount = 0;

        // Amount input
        document.getElementById('amountInput').addEventListener('input', function() {
            const val = this.value.replace(/\s/g, '');
            selectedAmount = val ? parseInt(val) : 0;
            updatePayButton();
        });

        document.getElementById('amountInput').focus();
        updatePayButton();

        function updatePayButton() {
            const btn = document.getElementById('payBtn');
            const text = btn.querySelector('.btn-text');
            if (selectedAmount >= 1000 && selectedAmount <= 100000000) {
                btn.disabled = false;
                text.textContent = '💳 ' + selectedAmount.toLocaleString('uz-UZ') + " so'm to'lash";
            } else {
                btn.disabled = true;
                if (selectedAmount > 0 && selectedAmount < 1000) {
                    text.textContent = "Minimal: 1 000 so'm";
                } else if (selectedAmount > 100000000) {
                    text.textContent = "Maksimal: 100 000 000 so'm";
                } else {
                    text.textContent = "💳 Summani kiriting";
                }
            }
        }

        async function handlePay() {
            if (!selectedAmount || selectedAmount < 1000 || selectedAmount > 100000000) {
                tg.showPopup({
                    title: '❌ Xatolik',
                    message: "Summa 1,000 — 100,000,000 so'm oralig'ida bo'lishi kerak",
                    buttons: [{ type: 'close' }]
                });
                return;
            }

            const btn = document.getElementById('payBtn');
            btn.classList.add('loading');
            btn.disabled = true;

            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) {
                tg.showPopup({
                    title: '❌ Xatolik',
                    message: "Telegram ID topilmadi. Bot orqali qayta urinib ko'ring.",
                    buttons: [{ type: 'close' }]
                });
                btn.classList.remove('loading');
                btn.disabled = false;
                return;
            }

            const orderId = 'topup_' + Date.now() + '_' + userId;

            try {
                // Step 1: Create topup order
                const orderResp = await fetch(getApiBase() + '/api/order/topup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-Init-Data': tg.initData || '',
                    },
                    body: JSON.stringify({
                        telegram_id: userId,
                        order_id: orderId,
                        amount: selectedAmount
                    })
                });

                const orderResult = await orderResp.json();
                if (!orderResult.ok) {
                    throw new Error(orderResult.error || 'Buyurtma yaratishda xatolik');
                }

                // Step 2: Create payment invoice
                const paymentResp = await fetch(getApiBase() + '/api/payment/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Telegram-Init-Data': tg.initData || '',
                    },
                    body: JSON.stringify({
                        telegram_id: userId,
                        order_id: orderId,
                        amount: selectedAmount,
                        method: 'fragment'
                    })
                });

                const paymentResult = await paymentResp.json();
                btn.classList.remove('loading');
                btn.disabled = false;

                if (paymentResult.ok && paymentResult.payment_url) {
                    tg.openLink(paymentResult.payment_url);
                } else {
                    tg.showPopup({
                        title: '❌ Xatolik',
                        message: paymentResult.error || "To'lov yaratishda xatolik. Qayta urinib ko'ring.",
                        buttons: [{ type: 'close' }]
                    });
                }
            } catch (e) {
                btn.classList.remove('loading');
                btn.disabled = false;
                tg.showPopup({
                    title: '❌ Tarmoq xatoligi',
                    message: e.message || "Serverga ulanib bo'lmadi. Qayta urinib ko'ring.",
                    buttons: [{ type: 'close' }]
                });
            }
        }

        function openStars() { window.location.href = 'stars.html'; }
        function openGifts() { window.location.href = 'gift.html'; }
        function openReyting() { window.location.href = 'index.html'; }
        function openProfile() { window.location.href = 'index.html'; }
    </script>
</body>
</html>
